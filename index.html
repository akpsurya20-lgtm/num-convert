<div class="app-container">
    <header class="header">
        <div class="logo-section">
            <div class="logo-icon">⚙️</div>
            <div class="logo-text">
                <h1>NUM_CONVERT</h1>
                <p class="subtitle">Real-time multi-base translation matrix</p>
            </div>
        </div>
        <button class="theme-toggle" id="themeToggle" title="Toggle theme">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="5"/>
                <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
            </svg>
        </button>
    </header>

    <main class="main-content">
        <div class="registers-header">
            <h2>Registers</h2>
            <p class="hint">Edit any field to translate across all bases</p>
        </div>

        <div class="register-card" data-base="16">
            <div class="register-label">
                <span class="icon">⭕</span>
                <span class="label-text">HEXADECIMAL <span class="base-tag">(BASE 16)</span></span>
            </div>
            <div class="input-wrapper">
                <input type="text" id="hexInput" class="register-input" placeholder="0" autocomplete="off" spellcheck="false">
                <button class="copy-btn" data-target="hexInput" title="Copy to clipboard">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="register-card" data-base="10">
            <div class="register-label">
                <span class="icon">#</span>
                <span class="label-text">DECIMAL <span class="base-tag">(BASE 10)</span></span>
            </div>
            <div class="input-wrapper">
                <input type="text" id="decInput" class="register-input" placeholder="0" autocomplete="off" spellcheck="false">
                <button class="copy-btn" data-target="decInput" title="Copy to clipboard">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="register-card" data-base="8">
            <div class="register-label">
                <span class="icon">🔺</span>
                <span class="label-text">OCTAL <span class="base-tag">(BASE 8)</span></span>
            </div>
            <div class="input-wrapper">
                <input type="text" id="octInput" class="register-input" placeholder="0" autocomplete="off" spellcheck="false">
                <button class="copy-btn" data-target="octInput" title="Copy to clipboard">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="register-card" data-base="2">
            <div class="register-label">
                <span class="icon">⚙️</span>
                <span class="label-text">BINARY <span class="base-tag">(BASE 2)</span></span>
            </div>
            <div class="input-wrapper">
                <input type="text" id="binInput" class="register-input" placeholder="0" autocomplete="off" spellcheck="false">
                <button class="copy-btn" data-target="binInput" title="Copy to clipboard">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                    </svg>
                </button>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>Built with precision</p>
    </footer>

    <div class="toast" id="toast">Copied to clipboard!</div>
</div>
